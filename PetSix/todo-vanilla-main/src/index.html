<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <link rel="stylesheet" href="./styles/index.css" />
    <script src="script.js" type="module"></script>
    <title>Document</title>
  </head>
  <body>
    <div class="todo" data-js-todo>
      <h1 class="todo__title"></h1>
      <form class="todo__form" data-js-todo-new-tack-form>
        <div class="todo__field field">
          <label class="field__label" for="new-task"> New task title </label>
          <input
            class="field__input"
            id="new-task"
            placeholder=" "
            autocomplete="off"
            data-js-todo-new-tack-input
          />
        </div>
        <button class="button" tupe="submit">Add</button>
      </form>
      <form class="todo__form" data-js-todo-search-tack-form>
        <div class="todo__field field">
          <label class="field__label" for="search-task"> Search tack </label>
          <input
            class="field__input"
            id="search-task"
            placeholder=" "
            autocomplete="off"
            type="search"
            data-js-todo-search-tack-input
          />
        </div>
      </form>
      <div class="todo__info">
        <div class="todo__totaltasks">Total Tasks: <span data-js-todo-total-tacks>0</span></div>
        <button 
        class="todo__delete-all-button" 
        type="button"
        data-js-todo-dellete-all-button
        >
          Delete All
        </button>
      </div>
      <ul class="todo__list" data-js-todo-list>
        <li class="todo__item todo-item" data-js-todo-item>
          <input 
          class="todo-item__checkbox" 
          id="todo-1" type="checkbox" 
          data-js-todo-item-checkbox
          />
          <label 
          class="todo-item__label" 
          for="todo-1"
          data-js-todo-item-label
          > 
          Todo 1 
        </label>
          <button
            class="todo-item__delete-button"
            type="button"
            aria-label="Delete"
            title="Delete"
            data-js-todo-dellete-button
          >
            <svg
              width="20"
              height="20"
              viewBox="0 0 16 16"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                fill-rule="evenodd"
                clip-rule="evenodd"
                d="M4.11 2.697L2.698 4.11 6.586 8l-3.89 3.89 1.415 1.413L8 9.414l3.89 3.89 1.413-1.415L9.414 8l3.89-3.89-1.415-1.413L8 6.586l-3.89-3.89z"
                fill="#000"
              ></path>
            </svg>
          </button>
        </li>
        <li class="todo__item todo-item" data-js-todo-item>
          <input 
          class="todo-item__checkbox" 
          id="todo-1" 
          type="checkbox" 
          data-js-todo-item-checkbox
          />
          <label 
          class="todo-item__label" 
          for="todo-1"
          data-js-todo-item-label
          > 
          Todo 1
        </label>
          <button
            class="todo-item__delete-button"
            type="button"
            aria-label="Delete"
            title="Delete"
            data-js-todo-dellete-button
          >
            <svg
              width="20"
              height="20"
              viewBox="0 0 16 16"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                fill-rule="evenodd"
                clip-rule="evenodd"
                d="M4.11 2.697L2.698 4.11 6.586 8l-3.89 3.89 1.415 1.413L8 9.414l3.89 3.89 1.413-1.415L9.414 8l3.89-3.89-1.415-1.413L8 6.586l-3.89-3.89z"
                fill="#000"
              ></path>
            </svg>
          </button>
        </li>
      </ul>
      <div class="todo__empty-message" data-js-todo-empty-message></div>


    </div>
  </body>
</html>
